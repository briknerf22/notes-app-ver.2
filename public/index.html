<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje Poznámky</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Databáze poznámek</h1>
 
<div id="auth-container">
    <div id="auth-section">
        <h2>Registrace / Přihlášení</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Uživatelské jméno" required>
            <input type="password" name="password" placeholder="Heslo" required>
            <button type="submit">Registrovat</button>
        </form>
    </div>

    <h2>Přihlášení</h2>
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Uživatelské jméno" required>
        <input type="password" name="password" placeholder="Heslo" required>
        <button type="submit">Přihlásit se</button>
    </form>
</div>

    <div id="notes-container" style="display: none;">
        <h2>Moje Poznámky</h2>
        <p>Stav: Přihlášen</p>
        <form action="/add-note" method="POST" style="display: flex; flex-direction: column; gap: 10px; max-width: 300px;">
            <input type="text" name="title" placeholder="Nadpis" required>
            <textarea name="text" placeholder="Obsah poznámky" required></textarea>
            
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" name="isImportant" style="width: auto; margin: 0;"> 
                <span>Označit jako důležité</span>
            </label>
            
            <button type="submit">Uložit poznámku</button>
        </form>
        <div id="notes-display"></div>
        <hr>
        <div class="account-actions" style="display: flex; gap: 10px; align-items: center; margin-top: 20px;">
            <a href="/logout"><button>Odhlásit se</button></a>
            
            <form action="/delete-account" method="POST" onsubmit="return confirm('Opravdu chcete smazat celý účet?')">
                <button type="submit" style="background: black; color: white;">Smazat účet</button>
            </form>
        </div>
    </div>

    <script>
    async function refreshUI() {
        const res = await fetch('/my-notes');
        
        if (res.ok) {
            // JSME PŘIHLÁŠENI
            const notes = await res.json();
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('notes-container').style.display = 'block';
            
            // Vykreslení poznámek (splnění chronologického výpisu)
            const display = document.getElementById('notes-display');
            display.innerHTML = notes.map(n => `
                <div class="note" style="${n.isImportant ? 'border-left: 5px solid red; background: #fff5f5;' : ''}">
                    <h3>${n.isImportant ? '📌 ' : ''}${n.title}</h3>
                    <p>${n.text}</p>
                    <small>${new Date(n.createdAt).toLocaleString()}</small>
                    <form action="/delete-note/${n._id}" method="POST" style="margin-top: 10px;">
                        <button type="submit" style="background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px;">Smazat</button>
                    </form>
                </div>
            `).join('');
        } else {
            // NEJSME PŘIHLÁŠENI
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('notes-container').style.display = 'none';
        }
    }

    // Spustit při načtení
    refreshUI();
    </script>

</body>
</html>
