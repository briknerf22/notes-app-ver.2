<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Moje Poznámky</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Databáze poznámek</h1>
    
    <div id="auth-section">
        <h2>Registrace / Přihlášení</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Uživatelské jméno" required>
            <input type="password" name="password" placeholder="Heslo" required>
            <button type="submit">Registrovat</button>
        </form>
    </div>

    <h2>Přihlášení</h2>
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Uživatelské jméno" required>
        <input type="password" name="password" placeholder="Heslo" required>
        <button type="submit">Přihlásit se</button>
    </form>

    <div id="notes-section" style="display: none;">
    <h2>Moje Poznámky</h2>
    
    <form action="/add-note" method="POST">
        <input type="text" name="title" placeholder="Nadpis poznámky" required>
        <textarea name="text" placeholder="Obsah poznámky..." required></textarea>
        <button type="submit">Uložit poznámku</button>
    </form>

    <hr>
    <div id="notes-display">
        </div>
    </div>

    <script>
    // Jednoduchý trik: zkusíme načíst poznámky. 
    // Pokud dostaneme 401, uživatel není přihlášen.
    async function checkAuth() {
        const res = await fetch('/my-notes');
        if (res.ok) {
            const notes = await res.json();
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('notes-section').style.display = 'block';
            renderNotes(notes);
        }
    }

    function renderNotes(notes) {
        const container = document.getElementById('notes-display');
        container.innerHTML = notes.map(n => `
            <div class="note">
                <h3>${n.title}</h3>
                <p>${n.text}</p>
                <small>${new Date(n.createdAt).toLocaleString()}</small>
            </div>
        `).join('');
    }

    checkAuth();
    </script>

    <hr>
    <p>Stav: Nepřihlášen</p>
</body>
</html>
